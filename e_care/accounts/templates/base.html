<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Django Role System</title>
  </head>
  <body>
    <nav>
      <h2>Hospital System</h2>

      {% if user.is_authenticated %}
        <p>Welcome, {{ user.username }} ({{ user.role }})</p>
        <a href="{% url 'logout' %}">Logout</a>
      {% else %}
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'register' %}">Register</a>
      {% endif %}
      <hr />
    </nav>

    {% block content %}

    {% endblock %}
  </body>
</html>
